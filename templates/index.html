<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cool Python Calculator</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --accent: #38bdf8;
            --accent-soft: rgba(56, 189, 248, 0.18);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --danger: #fb7185;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(56,189,248,.2), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(236,72,153,.18), transparent 25%),
                        linear-gradient(180deg, #020617 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .calculator {
            width: min(520px, 100%);
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.12);
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.4);
            border-radius: 28px;
            padding: 2rem;
            backdrop-filter: blur(18px);
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.8rem;
        }
        .title {
            font-size: clamp(1.75rem, 3vw, 2.5rem);
            margin: 0;
            letter-spacing: -0.04em;
        }
        .subtitle {
            color: var(--muted);
            margin: 0.25rem 0 0;
            font-size: 0.96rem;
        }
        .panel {
            background: var(--panel);
            border: 1px solid rgba(148, 163, 184, 0.08);
            border-radius: 22px;
            padding: 1.4rem;
            margin-bottom: 1.6rem;
        }
        .panel label {
            display: block;
            margin-bottom: 0.65rem;
            color: var(--muted);
            font-size: 0.95rem;
        }
        .panel input {
            width: 100%;
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.85);
            color: var(--text);
            font-size: 1.1rem;
            padding: 1rem 1.1rem;
            outline: none;
            transition: border-color 160ms ease;
        }
        .panel input:focus {
            border-color: rgba(56, 189, 248, 0.8);
        }
        .actions {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: center;
        }
        button {
            padding: 1rem 1.3rem;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #38bdf8, #8b5cf6);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: transform 160ms ease, box-shadow 160ms ease;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 35px rgba(56, 189, 248, 0.18);
        }
        .result-card {
            display: grid;
            gap: 0.75rem;
            padding: 1.4rem;
            border-radius: 22px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        .result-card h2 {
            margin: 0;
            font-size: 1rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .result {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3rem);
            color: var(--accent);
            word-break: break-word;
        }
        .error {
            color: var(--danger);
            margin-top: 0.5rem;
            font-size: 0.96rem;
        }
        .footer {
            margin-top: 1.8rem;
            color: var(--muted);
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="calculator">
        <div class="header">
            <div>
                <h1 class="title">Cool Python Calculator</h1>
                <p class="subtitle">Type any math expression and press calculate.</p>
            </div>
            <div>
                <span style="font-size:1.15rem; color:var(--accent);">Port 465</span>
            </div>
        </div>

        <form method="post" class="panel">
            <label for="expression">Expression</label>
            <input
                id="expression"
                name="expression"
                type="text"
                placeholder="e.g. 12 + 7 / 3"
                value="{{ expression | e }}"
                autocomplete="off"
            />
            <div class="actions">
                <button type="submit">Calculate</button>
            </div>
            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}
        </form>

        <section class="result-card">
            <h2>Result</h2>
            <p class="result">{{ result if result is not none else '—' }}</p>
        </section>

        <div class="footer">
            Supports +, -, *, /, parentheses, and decimals.
        </div>
    </main>
</body>
</html>
